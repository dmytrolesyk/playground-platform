name: Generate CV

on:
  workflow_dispatch:

jobs:
  cv-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Generate CV files
        run: pnpm generate-cv
      - name: Create PR if CV files changed
        run: |
          git diff --quiet public/downloads/ && echo "No changes" && exit 0
          BRANCH="chore/regenerate-cv-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add public/downloads/
          git commit -m "chore: regenerate CV files"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: regenerate CV files" \
            --body "Auto-generated by the Generate CV workflow." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
