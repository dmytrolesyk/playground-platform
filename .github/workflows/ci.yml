name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm build

  cv-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Generate CV files
        run: pnpm generate-cv
      - name: Check CV files are up-to-date
        run: |
          git diff --exit-code public/downloads/ || {
            echo "::error::CV files are stale. Run 'pnpm generate-cv' locally and commit the updated files."
            exit 1
          }
